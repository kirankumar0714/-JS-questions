<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy to Clipboard</title>
    <style>
         * {
            margin: 0;
            padding: 0;
            background-color: rgb(167, 224, 224);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }
         #checkButton {
            border-radius: 10px;
            padding: 5px;
        }

        #checkButton:hover {
            background-color: coral;
        }
    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <input type="text" placeholder="enter your text" id="myInput">
            <button onclick="copyFunction()" id="checkButton">Copy text</button>
            <div id="messageDiv">Message status :</div>
        </div>
    </form>
    <script>

        const inputEvent = document.getElementById("myInput")
        const message = document.getElementById("messageDiv")
        function copyFunction() {
            event.preventDefault()
            inputEvent.select();
            inputEvent.setSelectionRange(0, 1000);
            navigator.clipboard.writeText(inputEvent.value);
            message.textContent = `Message Copied sucessfully : ${inputEvent.value}`;
        }
    </script>
</body>

</html>
