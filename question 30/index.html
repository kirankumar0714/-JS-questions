<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse A String</title>
    <style>

    </style>
</head>

<body>
    
    <div>
        <input type="text" name="" id="timeEvent">
        <div>Countdown: <span id="countdown">0</span>  seconds remaining</div>
        <button onclick="countDown()">Click</button>
    </div>
    <script>
        let timeData = document.getElementById("timeEvent").value;
        function countDown(){
            var setTimer = setInterval(function () {
                if (timeData <= 0) {
                    clearInterval(setTimer);
                    document.getElementById("countdown").innerHTML = "Finished";
                } else {
                    document.getElementById("countdown").innerHTML = timeData.value--;
                }
                timeData -= 1;
            }, 1000);
        }
    </script>
</body>

</html>
