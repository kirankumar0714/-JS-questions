<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Suggestions</title>
    <style>

    </style>
</head>

<body>
    <form>
        <div>
            <input type="text" id="textEvent" placeholder="Search...">
            <ul id="suggestionList"></ul>

        </div>
    </form>
    <script>
        const searchElement = document.getElementById("textEvent");
        const resultEvent = document.getElementById("suggestionList");

        function deBounce(callback, delay) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout)
                timeout = setTimeout(() => {
                    callback.apply(this, args)
                }, delay)
            }
        }

        function searchInput(query) {
            if (query.trim() === '') {
                resultEvent.innerHTML = '';
                return;
            }
            console.log("Fetching results for:", query);
            fetch(`https://api.github.com/search/users?q=${query}`)
                .then(response => response.json())
                .then(data => displaySuggestions(data));
            displaySuggestions(['Result 1 for ' + query, 'Result 2 for ' + query]);
        }


        function displaySuggestions(results) {
            resultEvent.innerHTML = '';
            results.forEach(result => {
                const li = document.createElement('li');
                li.textContent = result;
                list.appendChild(li);
            });
        }

        
        const debouncedFetch = debounce(searchInput, 300);
        searchElement.addEventListener('input', (e) => {
            debouncedFetch(e.target.value);
        });

    </script>
</body>

</html>
