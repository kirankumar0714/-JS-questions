<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Suggestions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            background-color: rgb(170, 235, 179);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }

        #textContainer {
            width: 70%;
            padding: 7px;
            border-radius: 10px;
        }

        .checkButton {
            border-radius: 10px;
            padding: 5px;
        }

        .checkButton:hover {
            background-color: coral;
        }

        #resultDiv {
            text-align: center;
            font-size: larger;
        }
    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <input type="text" id="textEvent" placeholder="Search...">
            <ul id="resultDiv"></ul>

        </div>
    </form>
    <script>
        const result = document.getElementById('resultDiv')

        function debounce(callback, delay) {
            let timeout
            return function (...args) {
                clearTimeout(timeout)
                timeout = setTimeout(() => {
                    callback.apply(this, args)
                }, delay)
            }
        }

        function search(input) {


            const countries = ['India', 'Indonesia', 'Indigo', 'Nepal', 'South America', 'North America', 'Singapore', 'Malaysia']

            const arr = countries.filter((ele) => {
                if (ele.toLowerCase().includes(input)) {
                    return ele
                }
            })

            result.innerText = arr

        }

        const doDebounce = debounce(search, 500)

        const input = document.getElementById('textEvent')

        input.addEventListener("input", () => {
            if (!input.value) {
                result.innerText = ''
            }

            doDebounce(input.value)
        })

        let timer

        function startTimer() {

            timer = setTimeout(() => {
                document.getElementById("modal").style.display = "block"
            }, 30000)

        }

        function resetTimer() {
            clearTimeout(timer)
            document.getElementById("modal").style.display = "none"
            startTimer()
        }

        document.onmousemove = resetTimer
        document.onkeypress = resetTimer

        startTimer()

    </script>
</body>

</html>
