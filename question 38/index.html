<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse A String</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            background-color: rgb(167, 224, 224);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }

        #resultDiv {
            text-align: center;
            font-size: larger;
        }
    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <label for="">Search Here :</label>
            <input type="text" id="textEvent" oninput="deBounce(searchInput,1000)">
            <div id="resultDiv">Result :</div>
        </div>
    </form>
    <script>
        const searchElement = document.getElementById("textEvent");
        const resultEvent = document.getElementById("resultDiv");

        function deBounce(callback, delay) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout)
                timeout = setTimeout(() => {
                    callback(...args)
                }, delay)
            }
            console.log("hello")
        }

        function searchInput(event) {
            const value = event.target.value;
            resultEvent.innerHTML = ` Searched Value : ${value}`
        }
        const debounceHandler = deBounce(searchInput, 1000);
        searchElement.addEventListener('input', debounceHandler);
    </script>
</body>

</html>
