<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Frequency</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            background-color: rgb(167, 224, 224);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }

        #checkButton {
            border-radius: 10px;
            padding: 5px;
        }

        #checkButton:hover {
            background-color: coral;
        }

        #resultDiv {
            text-align: center;
            font-size: larger;
        }
    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <label for="">Enter a Sentence :</label>
            <input type="text" name="" id="textContainer">
            <div id="errorDiv">Error :</div>
            <button id="checkButton">Check</button>
            <div id="resultDiv">Result :</div>
        </div>
    </form>
    <script>
        const textInput = document.getElementById('textContainer');
        const errorText = document.getElementById('errorDiv');
        const checkButton = document.getElementById('checkButton');
        const resultSpan = document.getElementById('resultDiv');

        checkButton.addEventListener('click', function (e) {
            e.preventDefault()
            resultSpan.textContent = "";
            errorText.textContent = "";
            const inputValue = textInput.value;
            console.log('textInput.value:', textInput.value)
            if (inputValue === "") {
                errorText.textContent = "Please enter something"
            }
            else {
                const counter = freqCount(inputValue);
                resultSpan.textContent = JSON.stringify(counter);
            }

        });
        function freqCount(s) {
            const count = {};
            for (let x of s) {
                count[x] = (count[x] || 0) + 1;
            }
            return count;
        };
    </script>
</body>

</html>
