<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Frequency</title>
    <style>

    </style>
</head>

<body>
    <form>
        <div>
            <label for="">Enter a sentence : </label>
            <input type="text" id="textContainer">
            <div id="errorDiv">Error :</div>
            <button id="checkButton">Find Words</button>
            <div id="resultDiv">Result :</div>
        </div>
    </form>
    <script>
        const textInput = document.getElementById('textContainer');
        const errorText = document.getElementById('errorDiv');
        const checkButton = document.getElementById('checkButton');
        const resultSpan = document.getElementById('resultDiv');

        checkButton.addEventListener('click', function () {
            resultSpan.textContent = "";
            errorText.textContent = "";
            const inputValue = textInput.value;
            console.log('textInput.value:', textInput.value)
            if (inputValue === "") {
                errorText.textContent = "Please enter something"
            }
            else {
                const counter = freqCount(inputValue);
                resultSpan.textContent = JSON.stringify(counter);
            }

        });
        function freqCount(s) {
            const count = {};
            for (let x of s) {
                count[x] = (count[x] || 0) + 1;
            }
            return count;
        };
    </script>
</body>

</html>
