<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count words</title>
    <style>
         * {
            margin: 0;
            padding: 0;
            background-color: rgb(219, 187, 138);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }
        #checkButton {
            border-radius: 10px;
            padding: 5px;
        }

        #checkButton:hover {
            background-color: coral;
        }

        #resultDiv {
            text-align: center;
            font-size: larger;
        }
    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <label for="">Enter a Sentence :</label>
            <input type="text" name="" id="textContainer">
            <div id="errorDiv">Error :</div>
            <button id="checkButton">Count Words </button>
            <div id="resultDiv">Result :</div>
        </div>
    </form>
    <script>
        const inputvalue = document.getElementById("textContainer");
        const checkEvent = document.getElementById("checkButton")
        const resultEvent = document.getElementById("resultDiv")
        const errorEvent = document.getElementById("errorDiv")

        checkEvent.addEventListener("click", (e) => {
            e.preventDefault()
            let sentence = inputvalue.value.toLowerCase().trim();
            console.log('sentence:', sentence)

            if (sentence === "") {
                errorEvent.textContent = "Please Enter something"
            }
            if (/[^a-zA-Z0-9\s]/g.test(sentence)) {
                errorEvent.textContent = "Not allowed"
            } else {
                const result = frequency(sentence);
                resultEvent.textContent = result;
            }
            function frequency(str) {
                const words = str.split(/\s+/);
                console.log('words:', words)
                let count = words.length;
                console.log(count, "count")
                return count;
            }
        });
    </script>
</body>

</html>
