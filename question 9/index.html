<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse A String</title>
    <style>

    </style>
</head>

<body>
    <form>
        <div>
            <button id="checkButton">Find Date</button>
            <div id="resultDiv">Result :</div>
        </div>
    </form>

    <script>

        const checkButton = document.getElementById('checkButton');
        const resultSpan = document.getElementById('resultDiv');

        checkButton.addEventListener('click', function () {
            let now = new Date();
            resultSpan.textContent = now
        });
    </script>
</body>

</html>
