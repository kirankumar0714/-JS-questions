<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle User Detector</title>
    <style>
        #status {
            padding: 8px 12px;
            border-radius: 15px;
            color: #333;
            display: inline-flex;
            align-items: center;
            font-family: sans-serif;
            font-size: 14px;
        }
        .status.active {
            background-color: #e6fffa;
            color: #006b53;
            border: 1px solid #00b386;
        }

        .status.active::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00b386;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>

<body>

    <div id="status" class="status active">User is Active</div>

    <script>
        function isActive() {
            let idleTime = 0;
            const idleLimit = 5;
            const statusDiv = document.getElementById('status');
            let idleTimer;
            function setActive() {
                idleTime = 0;
                statusDiv.textContent = "User is Active";
                statusDiv.classList.remove('idle');
                statusDiv.classList.add('active');
            }
            function setIdle() {
                statusDiv.textContent = "User is Idle";
                statusDiv.classList.remove('active');
                statusDiv.classList.add('idle');
            }
            function resetTimer() {
                idleTime = 0;
                if (statusDiv.classList.contains('idle')) {
                    setActive();
                }
            }

            ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(event => {
                window.addEventListener(event, resetTimer, { passive: true });
            });

            idleTimer = setInterval(() => {
                idleTime++;
                if (idleTime >= idleLimit) {
                    setIdle();
                }
            }, 3000);

        }
        isActive();
    </script>

</body>

</html>
