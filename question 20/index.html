<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            background-color: rgb(167, 224, 224);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }

        #checkButton {
            border-radius: 10px;
            padding: 5px;
        }

        #checkButton:hover {
            background-color: coral;
        }

        #resultDiv {
            text-align: center;
            font-size: larger;
        }
        </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <label for="">Enter The Minimum num: </label>
            <input type="text" id="minContainer">
            <label for="">Enter The Maximum number: </label>
            <input type="text" id="maxContainer">
            <div id="errorDiv">Error :</div>
            <button id="checkButton">Find</button>
            <div id="resultDiv">Result :</div>
        </div>
    </form>
    <script>
        const minInput = document.getElementById('minContainer');
        const maxInput = document.getElementById('maxContainer');
        const errorText = document.getElementById('errorDiv');
        const checkButton = document.getElementById('checkButton');
        const resultSpan = document.getElementById('resultDiv');

        checkButton.addEventListener('click', function (e) {
            e.preventDefault()
            resultSpan.textContent = "";
            errorText.textContent = "";
            const minVal = minInput.value;
            const maxVal = maxInput.value;
            if (minVal && maxVal === "") {
                errorText.textContent = "Please enter something"
            }
            if (!/^[0-9]*$/.test(minVal)) {
                errorText.textContent = "Only numbers are allowed"
            }
            if (!/^[0-9]*$/.test(maxVal)) {
                errorText.textContent = "Only numbers are allowed"
            }
            if (minVal > maxVal) {
                errorText.textContent = "Max Value should be greater tha Min"
            } else {
                const random = randomGenerator(minVal, maxVal);
                resultSpan.textContent = random;
            }
        });
        function randomGenerator(min, max) {
            min = Math.ceil(min);
            max = Math.floor(max);
            return Math.floor(Math.random() * (max - min + 1)) + min

        }
    </script>
</body>

</html>
