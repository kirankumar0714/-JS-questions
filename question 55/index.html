<!DOCTYPE html>
<html>

<head>
    <title>API Retry</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            min-height: 50px;
        }
    </style>
</head>

<body>

    <button onclick="fetchData()">Fetch Data</button>

    <div id="result"></div>

    <script>

        function fetchData(retries = 3) {

            document.getElementById("result").innerHTML = "Loading..."

            fetch("https://jsonplaceholder.typicode.com/posts")
                .then(res => {

                    if (!res.ok) throw new Error("Error")
                    return res.json()

                })
                .then(data => {
                    document.getElementById("result").innerHTML = "Success"
                })
                .catch(() => {
                    if (retries > 0) {
                        document.getElementById("result").innerHTML = "Retrying..."
                        setTimeout(() => fetchData(retries - 1), 1000)
                    } else {
                        document.getElementById("result").innerHTML = "Failed after retries"
                    }

                })

        }

    </script>
</body>

</html>
