<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpperCase</title>
    <style>
         * {
            margin: 0;
            padding: 0;
            background-color: rgb(167, 224, 224);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }

        #checkButton {
            border-radius: 10px;
            padding: 5px;
        }

        #checkButton:hover {
            background-color: coral;
        }

        #resultDiv {
            text-align: center;
            font-size: larger;
        }
    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <label for="">Enter a text :</label>
             <input type="text" name="" id="textContent">
            <button onclick="myFunction()" id="checkButton">click</button>
            <div id="resultDiv">Result :</div>
        </div>
</form>
    <script>
        function myFunction() {
            event.preventDefault()
            const elementDiv = document.getElementById("textContent");
            const resultEvent = document.getElementById("resultDiv");
            const inputVal = elementDiv.value.toUpperCase();
            resultEvent.innerHTML =`UpperCase : ${inputVal}`;
        }
    </script>
</body>

</html>
