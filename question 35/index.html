<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Items</title>
    <style>
         * {
            margin: 0;
            padding: 0;
            background-color: rgb(167, 224, 224);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        .container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            width: 20%;
        }
        .itemList{
            padding: 40px 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>My Infinite Scroll List</h1>
        <div class="itemList">

        </div>
        <div class="loader">
            <p>Loading more items...</p>
        </div>
    </div>
    <script>
        const itemList = document.querySelector('.itemList');
        const loader = document.querySelector('.loader');
        let itemCount = 1;
        let isLoading = false;
        function loadMoreContent() {
            if (isLoading) return;
            isLoading = true;
            setTimeout(() => {
                for (let i = 0; i < 10; i++) {
                    let item = document.createElement("div");
                    item.classList.add("item");
                    item.textContent = `item ${itemCount++}`;
                    itemList.appendChild(item);
                }
                isLoading = false;
            }, 1000);
        }

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
                loadMoreContent();
            }
        });
        loadMoreContent();
    </script>
</body>

</html>
