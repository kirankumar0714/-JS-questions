<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password check</title>
    <style>
             * {
            margin: 0;
            padding: 0;
            background-color: rgb(167, 224, 224);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }
        #password{
             border-radius: 10px;
            padding: 5px;
        }
        #toggle{
             border-radius: 10px;
            padding: 5px;
        }
    </style>
</head>

<body>
    <form id="myForm">
        <div   id="container">
            <input type="password" id="password">
            <input type="checkbox" id="toggle">
            <label>Show Password</label>
        </div>
    </form>

    <script>
        let password = document.getElementById("password");
        let checkbox = document.getElementById("toggle");
        checkbox.onclick = function () {
            if (checkbox.checked) {
                password.type = "text";
            } else {
                password.type = "password";
            }
        }
    </script>
</body>

</html>
