<!DOCTYPE html>
<html>

<head>
    <title>ApiPagination</title>
    <style>
        body {
            font-family: Arial;
            background-color: rgb(221, 164, 95);
            color: rgb(15, 14, 14);
        }

        table {
            border-collapse: collapse;
            width: 60%

        }

        td,
        th {
            border: 1px solid black;
            padding: 8px;
            text-align: center
        }

        button {
            margin: 5px;
            padding: 5px 10px
        }
    </style>
</head>
<body>
    <h2>Products Table</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="productBody"></tbody>
    </table>
    <div id="pagination"></div>
    <script>
        let currentPage = 1
        let totalPages = 5
        function loadProducts(page) {
            fetch("https://dummyjson.com/products?limit=10&skip=" + ((page - 1) * 10))
                .then(res => res.json())
                .then(data => {
                    let rows = ""
                    data.products.forEach(p => {
                        rows += `<tr>
                        <td>${p.id}</td>
                       <td>${p.title}</td>
                       <td>${p.price}</td>
                    </tr>`
                    })
                    document.getElementById("productBody").innerHTML = rows
                })
        }

        function createPagination() {
            let buttons = ""
            for (let i = 1; i <= totalPages; i++) {
                buttons += `<button onclick="changePage(${i})">${i}</button>`
            }
            document.getElementById("pagination").innerHTML = buttons
        }

        function changePage(page) {
            currentPage = page
            loadProducts(page)
        }

        createPagination()
        loadProducts(currentPage)
    </script>

</body>

</html>
