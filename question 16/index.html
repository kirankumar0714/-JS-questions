<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowels And Consonants</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            background-color: rgb(167, 224, 224);
            font-size: medium;
        }

        body {
            height: 100vh;
        }

        #myForm {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }

        #checkButton {
            border-radius: 10px;
            padding: 5px;
        }

        #checkButton:hover {
            background-color: coral;
        }

        #resultDiv {
            text-align: center;
            font-size: larger;
        }
    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <label for="">Enter a Sentence :</label>
            <input type="text" name="" id="textContainer">
            <div id="errorDiv">Error :</div>
            <button id="checkButton">Check</button>
            <div id="resultDiv">Result :</div>
        </div>
    </form>
    <script>
        const textInput = document.getElementById('textContainer');
        const errorText = document.getElementById('errorDiv');
        const checkButton = document.getElementById('checkButton');
        const resultSpan = document.getElementById('resultDiv');

        checkButton.addEventListener('click', function (e) {
            e.preventDefault()
            const inputText = textInput.value;
            if (inputText === "") {
                errorText.textContent = "Please enter something"
            }
            if (/[^a-zA-Z0-9\s]/g.test(inputText)) {
                errorText.textContent = "Not allowed"
            }
            if (!/^\d+$/) {
                errorText.textContent = " Numbers Not Allowed"
            }
            else {
                const vowelCount = countVowels(inputText);
                const consonantCount = countConsonants(inputText);
                resultSpan.innerHTML = `Vowels Count : ${vowelCount}   Consonants Count : ${consonantCount} `;
            }
        });
        function countVowels(str) {
            let count = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str.charAt(i)
                if ("aeiou".includes(char)) {
                    count++;
                }
            }
            console.log("Vowels count : ", count)
            return count;
        }
        function countConsonants(str) {
            let count = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str.charAt(i)
                if (!"aeiou".includes(char)) {
                    count++;
                }
            }
            console.log("Consonants count : ", count)
            return count;
        }
    </script>
</body>

</html>
