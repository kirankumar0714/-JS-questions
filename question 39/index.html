<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search user</title>
    <style>

    </style>
</head>

<body>
    <form>
        <div>
            <label for="">Search Here :</label>
            <input type="text" id="textEvent">
            <div id="resultDiv">Result :</div>
        </div>
    </form>
    <script>
        const searchElement = document.getElementById("textEvent");
        const resultEvent = document.getElementById("resultDiv");

        function deBounce(callback, delay) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout)
                timeout = setTimeout(() => {
                    callback.apply(this,args)
                }, delay)
            }
            console.log("hello")
        }

        const searchInput=(query)=> {
            
            fetch(`https://api.github.com/search/users?q=${query}`)
              .then(response=>response.json())
              .then((data)=>{
                resultEvent.innerHTML = 
                data.items.map((ele)=> ele.login.join("/n"));
                console.log(data)
              })
            
     .catch ((error)=>{
         resultEvent.innerHTML = `Error Occured`
     }) 
    }
        const debounceHandler = deBounce(searchInput, 1000);
        searchElement.addEventListener('input', (event) => {
            debounceHandler(event.target.value);
        });
    </script>
</body>

</html>
