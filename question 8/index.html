<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove an Element</title>
    <style>

    </style>
</head>

<body>
     <div class="container">
        <h2>Insert Element into Array</h2>
        <div class="form-group">
            <label for="arrayElements">Enter a Array :</label>
            <input type="text" id="arrayElements" placeholder="A,B,C,D">
        </div>
        <div class="form-group">
            <label for="position">Position :</label>
            <input type="text" id="position" placeholder="Position index">
        </div>
        <div class="form-group">
            <label for="newElement">New Element :</label>
            <input type="text" id="newElement" placeholder="New element value">
        </div>
        <button id="insertButton" type="button" onclick="insertElement()">Insert Element</button>
        <div id="errorDiv"></div>
        <div id="resultDiv"></div>
    </div>

    <script>
        function insertElement() {
            const arrayInput = document.getElementById('arrayElements').value;
            const positionInput = document.getElementById('position').value;
            const newElementInput = document.getElementById('newElement').value;
            const errorDiv = document.getElementById('errorDiv');
            const resultDiv = document.getElementById('resultDiv');
          
            errorDiv.innerHTML = '';
            resultDiv.innerHTML = '';
            if (!arrayInput || !positionInput || !newElementInput) {
                errorDiv.innerHTML = 'All fields must be filled out.';
            }
            const array = arrayInput.split(',').map(item => item.trim());
            const position = parseInt(positionInput, 10);
            if (isNaN(position) || position < 0 || position > array.length) {
                errorDiv.innerHTML = 'Invalid position Must be a number between 0 and ' + array.length 
            }
            array.splice(position, 1, newElementInput);
            resultDiv.innerHTML = 'Updated Array: [' + array.join(', ') + ']';
        }
    </script>

    </script>
</body>

</html>
