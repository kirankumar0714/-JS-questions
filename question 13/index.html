<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <h1>Cookie Counter</h1>
            <p>You have visited this page <span id="count"></span> times.</p>
            <button onclick="incrementCounter()">Click to count!</button>
        </div>
    </form>

    <script>
        function setCookie(cname, cvalue, exdays) {
            const d = new Date();
            d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000));
            let expires = "expires=" + d.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
        }

        function getCookie(cname) {
            let name = cname + "=";
            let decodedCookie = decodeURIComponent(document.cookie);
            let data = decodedCookie.split(';');
            for (let i = 0; i < data.length; i++) {
                let c = data[i];
                while (c.charAt(0) === ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(name) === 0) {
                    return c.substring(name.length, c.length);
                }
            }
            return "";
        }

 
        function incrementCounter(e) {
            e.preventDefault()
            console.log("count");
            let count = parseInt(getCookie("page_visit_count") || 0) + 1;
            setCookie("page_visit_count", count, 365);
            console.log('count:', count)
            document.getElementById("count").textContent = count;
        }
        window.onload = incrementCounter;

    </script>
</body>

</html>
