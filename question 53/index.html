<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Event Bus</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        button {
            background-color: #04AA6D;
            color: white;
            padding: 10px 15px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        #logoutBtn {
            background-color: #f44336;
        }

        p#status {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
        }


        .is-hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <h2>User System</h2>
    <button id="loginBtn">Log In </button>
    <button id="logoutBtn">Log In </button>
    <p id="status"></p>

    <script>
        const eventBus = {
            events: {},
            subscribe(eventName, callback) {
                if (!this.events[eventName]) {
                    this.events[eventName] = [];
                }
                this.events[eventName].push(callback);
            },

            publish(eventName, data) {
                if (this.events[eventName]) {
                    this.events[eventName].forEach(callback => callback(data));
                }
            }
        };
        const statusElement = document.getElementById('status');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        eventBus.subscribe("userLogin", (user) => {
            statusElement.innerHTML = `${user.name} ,Logged In!`;
            statusElement.style.color = "green";
        });
        eventBus.subscribe("userLogout", (user) => {
            statusElement.innerHTML = `${user.name} ,Logged out!`;
            statusElement.style.color = "darkred";
        });

        eventBus.subscribe("userLogin", (user) => {
            console.log(`User logged in: ${user.name}`);
        });

        loginBtn.addEventListener('click', () => {
            eventBus.publish("userLogin", { name: "Kiran" });
        });
        logoutBtn.addEventListener('click', () => {
            eventBus.publish("userLogout", { name: "kiran" });
        });

    </script>
</body>

</html>
