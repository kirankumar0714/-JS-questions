<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse A String</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            background-color: rgb(219, 203, 203);
            font-size: medium;
        }
        body{
            height: 100vh;
        }
        #myform{
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #container{
            border: 2px solid black;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            background-color: transparent;
            color: black;
            height: 30%;
            width: 20%;
        }
         #resultDiv{
            text-align: center;
            font-size: larger;
        }

    </style>
</head>

<body>
    <form id="myForm">
        <div id="container">
            <div><b>Checking Network Status</b></div>
            <div id="resultDiv">Browser Status : </div>
        </div>
    </form>
    <script>
        const statusDisplay = document.getElementById('resultDiv');

        function updateStatus() {
            if (navigator.onLine) {
                statusDisplay.textContent = 'Browser is online ';
                statusDisplay.classList.remove('offline');
                statusDisplay.classList.add('online');
                console.log('Browser is online');
            } else {
                statusDisplay.textContent = 'Browser is offline'
                statusDisplay.classList.remove('online');
                statusDisplay.classList.add('offline');
                console.log('Browser is offline');
            }
        }


        window.addEventListener('load', updateStatus);
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);



    </script>
</body>

</html>
