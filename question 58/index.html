<!DOCTYPE html>
<html>

<head>
    <title>Multi Step Form</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f9;
        }

        #step1,
        #step2,
        #step3 {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
            display: none;
        }


        #step1.active,
        #step2.active,
        #step3.active {
            display: block;
        }

        #step1 {
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>

</head>

<body>

    <div id="step1">
        Name: <input id="name"><br>
        <button onclick="next(1)">Next</button>
    </div>
    <div id="step2" style="display:none">
        Address: <input id="address"><br>
        <button onclick="prev(2)">Back</button>
        <button onclick="next(2)">Next</button>
    </div>

    <div id="step3" style="display:none">
        Review Complete<br>
        <button onclick="prev(3)">Back</button>
    </div>

    <script>

        function next(step) {
            document.getElementById("step" + step).style.display = "none"
            document.getElementById("step" + (step + 1)).style.display = "block"
        }

        function prev(step) {
            document.getElementById("step" + step).style.display = "none"
            document.getElementById("step" + (step - 1)).style.display = "block"
        }

    </script>

</body>

</html>
